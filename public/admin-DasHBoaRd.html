<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Royal Match - Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .header h1 {
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border-left: 5px solid #667eea;
    }

    .stat-card h3 {
      color: #666;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #333;
    }

    .section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .section h2 {
      color: #333;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    table thead {
      background: #f5f5f5;
    }

    table th {
      padding: 12px;
      text-align: left;
      color: #333;
      font-weight: 600;
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      color: #666;
    }

    table tr:hover {
      background: #f9f9f9;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: 0.3s;
      margin-right: 5px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-danger {
      background: #ff6b6b;
      color: white;
    }

    .btn-danger:hover {
      background: #ee5a5a;
    }

    .btn-success {
      background: #51cf66;
      color: white;
    }

    .btn-success:hover {
      background: #40c057;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-group input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .error {
      background: #ffe0e0;
      color: #d32f2f;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .success {
      background: #e8f5e9;
      color: #388e3c;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      table th, table td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎰 Royal Match - Admin Dashboard</h1>
      <p>Manage game, users, and analytics</p>
    </div>

    <div id="message"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Users</h3>
        <div class="value" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Games</h3>
        <div class="value" id="totalGames">0</div>
      </div>
      <div class="stat-card">
        <h3>Online Players</h3>
        <div class="value" id="onlinePlayers">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Coins</h3>
        <div class="value" id="totalCoins">0</div>
      </div>
    </div>

    <div class="section">
      <h2>📊 Game Analytics</h2>
      <div id="analytics">
        <div class="loading">Loading analytics...</div>
      </div>
    </div>

    <div class="section">
      <h2>👥 User Management</h2>
      <div class="input-group">
        <input type="text" id="userSearch" placeholder="Search user by email or username...">
        <button class="btn btn-primary" onclick="searchUsers()">Search</button>
      </div>
      <div id="usersTable">
        <div class="loading">Loading users...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    let token = localStorage.getItem('adminToken');

    if (!token) {
      token = prompt('Enter admin token:');
      if (!token) {
        alert('Admin token required');
        window.location.href = '/';
      }
      localStorage.setItem('adminToken', token);
    }

    const headers = {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    };

    async function loadStats() {
      try {
        const res = await fetch(`${API_URL}/admin/stats`, { headers });
        const data = await res.json();

        document.getElementById('totalUsers').textContent = data.totalUsers;
        document.getElementById('totalGames').textContent = data.totalGames;
        document.getElementById('onlinePlayers').textContent = data.onlinePlayers;
        document.getElementById('totalCoins').textContent = data.totalCoinsInGame.toLocaleString();
      } catch (error) {
        showMessage('Error loading stats: ' + error.message, 'error');
      }
    }

    async function loadAnalytics() {
      try {
        const res = await fetch(`${API_URL}/admin/analytics`, { headers });
        const data = await res.json();

        document.getElementById('analytics').innerHTML = `
          <table>
            <tr>
              <td><strong>Total Games Played:</strong></td>
              <td>${data.totalGames}</td>
            </tr>
            <tr>
              <td><strong>Total Coins Earned:</strong></td>
              <td>${data.totalCoinsEarned.toLocaleString()}</td>
            </tr>
            <tr>
              <td><strong>Total XP Earned:</strong></td>
              <td>${data.totalXpEarned.toLocaleString()}</td>
            </tr>
            <tr>
              <td><strong>Win Rate:</strong></td>
              <td>${data.winRate}%</td>
            </tr>
          </table>
        `;
      } catch (error) {
        showMessage('Error loading analytics: ' + error.message, 'error');
      }
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API_URL}/admin/users`, { headers });
        const users = await res.json();

        let html = '<table><thead><tr><th>Username</th><th>Email</th><th>Level</th><th>Coins</th><th>Status</th><th>Actions</th></tr></thead><tbody>';

        users.forEach(user => {
          html += `
            <tr>
              <td>${user.username}</td>
              <td>${user.email}</td>
              <td>${user.level}</td>
              <td>${user.coins}</td>
              <td>${user.banned ? '<span style="color:red;">Banned</span>' : 'Active'}</td>
              <td>
                ${user.banned ? 
                  `<button class="btn btn-success" onclick="unbanUser('${user.uid}')">Unban</button>` :
                  `<button class="btn btn-danger" onclick="banUser('${user.uid}')">Ban</button>`
                }
                <button class="btn btn-primary" onclick="addCoins('${user.uid}')">Add Coins</button>
              </td>
            </tr>
          `;
        });

        html += '</tbody></table>';
        document.getElementById('usersTable').innerHTML = html;
      } catch (error) {
        showMessage('Error loading users: ' + error.message, 'error');
      }
    }

    async function banUser(userId) {
      if (confirm('Ban this user?')) {
        try {
          const res = await fetch(`${API_URL}/admin/users/${userId}/ban`, {
            method: 'POST',
            headers
          });
          const data = await res.json();
          showMessage(data.message, 'success');
          loadUsers();
        } catch (error) {
          showMessage('Error: ' + error.message, 'error');
        }
      }
    }

    async function unbanUser(userId) {
      try {
        const res = await fetch(`${API_URL}/admin/users/${userId}/unban`, {
          method: 'POST',
          headers
        });
        const data = await res.json();
        showMessage(data.message, 'success');
        loadUsers();
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    async function addCoins(userId) {
      const amount = prompt('Enter coins to add:');
      if (amount) {
        try {
          const res = await fetch(`${API_URL}/admin/users/${userId}/coins`, {
            method: 'POST',
            headers,
            body: JSON.stringify({ amount: parseInt(amount) })
          });
          const data = await res.json();
          showMessage(data.message, 'success');
          loadUsers();
          loadStats();
        } catch (error) {
          showMessage('Error: ' + error.message, 'error');
        }
      }
    }

    async function searchUsers() {
      const query = document.getElementById('userSearch').value.toLowerCase();
      if (!query) {
        loadUsers();
        return;
      }

      try {
        const res = await fetch(`${API_URL}/admin/users`, { headers });
        const users = await res.json();
        const filtered = users.filter(u => 
          u.username.toLowerCase().includes(query) || 
          u.email.toLowerCase().includes(query)
        );

        let html = '<table><thead><tr><th>Username</th><th>Email</th><th>Level</th><th>Coins</th><th>Actions</th></tr></thead><tbody>';

        filtered.forEach(user => {
          html += `
            <tr>
              <td>${user.username}</td>
              <td>${user.email}</td>
              <td>${user.level}</td>
              <td>${user.coins}</td>
              <td>
                <button class="btn btn-danger" onclick="banUser('${user.uid}')">Ban</button>
                <button class="btn btn-primary" onclick="addCoins('${user.uid}')">Add Coins</button>
              </td>
            </tr>
          `;
        });

        html += '</tbody></table>';
        document.getElementById('usersTable').innerHTML = html;
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    function showMessage(msg, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.className = type;
      msgDiv.textContent = msg;
      setTimeout(() => msgDiv.textContent = '', 5000);
    }

    // Load data on page load
    loadStats();
    loadAnalytics();
    loadUsers();

    // Refresh stats every 30 seconds
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
