<h1>Game Admin Dashboard</h1>

<button onclick="loadPlayers()">Load Players</button>

<table border="1">
<thead>
<tr>
<th>Player</th>
<th>Coins</th>
<th>Add Coins</th>
</tr>
</thead>

<tbody id="playersTable"></tbody>
</table>

<script>
async function loadPlayers(){

 const res = await fetch("/admin-api/players");
 const players = await res.json();

 const table = document.getElementById("playersTable");
 table.innerHTML="";

 for(const id in players){

   const p = players[id];

   table.innerHTML += `
   <tr>
     <td>${p.name || p.username}</td>
     <td>${p.coins}</td>
     <td>
       <button onclick="addCoins('${id}')">+100</button>
     </td>
   </tr>
   `;
 }
}

async function addCoins(playerId){

 await fetch("/admin-api/add-coins",{
   method:"POST",
   headers:{
     "Content-Type":"application/json"
   },
   body:JSON.stringify({
     playerId:playerId,
     coins:100
   })
 });

 loadPlayers();
}
</script>
