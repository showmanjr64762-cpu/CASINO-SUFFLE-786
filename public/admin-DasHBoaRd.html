<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Royal Match - Admin Dashboard</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      color: #333;
    }

    .status {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #51cf66;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border-left: 5px solid #667eea;
    }

    .stat-card h3 {
      color: #666;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #333;
    }

    .section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .section h2 {
      color: #333;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table thead {
      background: #f5f5f5;
    }

    table th {
      padding: 12px;
      text-align: left;
      color: #333;
      font-weight: 600;
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      color: #666;
    }

    table tr:hover {
      background: #f9f9f9;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: 0.3s;
      margin-right: 5px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-danger {
      background: #ff6b6b;
      color: white;
    }

    .btn-danger:hover {
      background: #ee5a5a;
    }

    .btn-success {
      background: #51cf66;
      color: white;
    }

    .btn-success:hover {
      background: #40c057;
    }

    .activity-feed {
      max-height: 400px;
      overflow-y: auto;
    }

    .activity-item {
      padding: 12px;
      border-left: 3px solid #667eea;
      margin-bottom: 10px;
      background: #f9f9f9;
      border-radius: 5px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .activity-item .time {
      font-size: 12px;
      color: #999;
    }

    .activity-item .message {
      color: #333;
      font-weight: 500;
    }

    .error {
      background: #ffe0e0;
      color: #d32f2f;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .success {
      background: #e8f5e9;
      color: #388e3c;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎰 Royal Match - Admin Dashboard</h1>
      <div class="status">
        <div class="status-indicator"></div>
        <span>Live</span>
      </div>
    </div>

    <div id="message"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Users</h3>
        <div class="value" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Games</h3>
        <div class="value" id="totalGames">0</div>
      </div>
      <div class="stat-card">
        <h3>Online Players</h3>
        <div class="value" id="onlinePlayers">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Coins</h3>
        <div class="value" id="totalCoins">0</div>
      </div>
    </div>

    <div class="section">
      <h2>🔔 Live Activity Feed</h2>
      <div class="activity-feed" id="activityFeed">
        <p style="color: #999; text-align: center;">Waiting for activity...</p>
      </div>
    </div>

    <div class="section">
      <h2>👥 User Management</h2>
      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Level</th>
            <th>Coins</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="6" style="text-align: center; color: #999;">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    const socket = io();
    let token = localStorage.getItem('adminToken');

    if (!token) {
      token = prompt('Enter admin token:');
      if (!token) {
        alert('Admin token required');
        window.location.href = '/';
      }
      localStorage.setItem('adminToken', token);
    }

    const headers = {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    };

    // Connect to real-time updates
    socket.emit('admin:join', {});

    // Listen for game results
    socket.on('game:new-result', (data) => {
      addActivity(`🎮 ${data.username} earned ${data.coinsEarned} coins (${data.won ? 'WIN' : 'LOSS'})`);
      loadStats();
    });

    // Listen for player online/offline
    socket.on('players:online-update', (data) => {
      addActivity(`✅ ${data.username} (Lvl ${data.level}) came online`);
      loadStats();
    });

    socket.on('players:offline-update', (data) => {
      addActivity(`❌ Player #${data.userId} went offline`);
      loadStats();
    });

    // Listen for admin actions
    socket.on('user:banned', (data) => {
      addActivity(`🚫 User #${data.userId} was banned`);
      loadUsers();
    });

    socket.on('admin:coins-added', (data) => {
      addActivity(`💰 Added ${data.amount} coins to user #${data.userId}`);
      loadStats();
    });

    // Listen for online count
    socket.on('users:online-count', (count) => {
      document.getElementById('onlinePlayers').textContent = count;
    });

    function addActivity(message) {
      const feed = document.getElementById('activityFeed');
      if (feed.children.length === 1 && feed.children[0].textContent.includes('Waiting')) {
        feed.innerHTML = '';
      }

      const time = new Date().toLocaleTimeString();
      const item = document.createElement('div');
      item.className = 'activity-item';
      item.innerHTML = `<div class="message">${message}</div><div class="time">${time}</div>`;
      feed.insertBefore(item, feed.firstChild);

      // Keep only last 20 items
      while (feed.children.length > 20) {
        feed.removeChild(feed.lastChild);
      }
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API_URL}/admin/stats`, { headers });
        const data = await res.json();

        document.getElementById('totalUsers').textContent = data.totalUsers;
        document.getElementById('totalGames').textContent = data.totalGames;
        document.getElementById('onlinePlayers').textContent = data.onlinePlayers;
        document.getElementById('totalCoins').textContent = data.totalCoinsInGame.toLocaleString();
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API_URL}/admin/users`, { headers });
        const users = await res.json();

        let html = '';
        users.forEach(user => {
          html += `
            <tr>
              <td>${user.username}</td>
              <td>${user.email}</td>
              <td>${user.level}</td>
              <td>${user.coins}</td>
              <td>${user.banned ? '<span style="color:red;">Banned</span>' : 'Active'}</td>
              <td>
                ${user.banned ? 
                  `<button class="btn btn-success" onclick="unbanUser('${user.uid}')">Unban</button>` :
                  `<button class="btn btn-danger" onclick="banUser('${user.uid}')">Ban</button>`
                }
                <button class="btn btn-primary" onclick="addCoins('${user.uid}')">Add Coins</button>
              </td>
            </tr>
          `;
        });

        document.getElementById('usersTable').innerHTML = html;
      } catch (error) {
        console.error('Error loading users:', error);
      }
    }

    async function banUser(userId) {
      if (confirm('Ban this user?')) {
        try {
          const res = await fetch(`${API_URL}/admin/users/${userId}/ban`, {
            method: 'POST',
            headers
          });
          const data = await res.json();
          showMessage(data.message, 'success');
          loadUsers();
        } catch (error) {
          showMessage('Error: ' + error.message, 'error');
        }
      }
    }

    async function unbanUser(userId) {
      try {
        const res = await fetch(`${API_URL}/admin/users/${userId}/unban`, {
          method: 'POST',
          headers
        });
        const data = await res.json();
        showMessage(data.message, 'success');
        loadUsers();
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    async function addCoins(userId) {
      const amount = prompt('Enter coins to add:');
      if (amount) {
        try {
          const res = await fetch(`${API_URL}/admin/users/${userId}/coins`, {
            method: 'POST',
            headers,
            body: JSON.stringify({ amount: parseInt(amount) })
          });
          const data = await res.json();
          showMessage(data.message, 'success');
          loadUsers();
          loadStats();
        } catch (error) {
          showMessage('Error: ' + error.message, 'error');
        }
      }
    }

    function showMessage(msg, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.className = type;
      msgDiv.textContent = msg;
      setTimeout(() => msgDiv.textContent = '', 5000);
    }

    // Initial load
    loadStats();
    loadUsers();

    // Refresh stats every 60 seconds
    setInterval(loadStats, 60000);

    app.get("/dashboard", (req, res) => {
  res.sendFile(path.join(__dirname, "public", "dashboard.html"));
});
  </script>
</body>
</html>
